apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: omnibridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
      - name: postgres
        image: ankane/pgvector:latest
        envFrom:
        - secretRef:
            name: db-secrets
        ports:
        - containerPort: 5432
        volumeMounts:
        - name: postgres-storage
          mountPath: /var/lib/postgresql/data
      volumes:
      - name: postgres-storage
        emptyDir: {} # Use PersistentVolumeClaim in production
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: omnibridge
spec:
  ports:
  - port: 5432
  selector:
    app: postgres
